name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (tesseract, poppler, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            poppler-utils \
            fonts-liberation \
            fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Run tests
        run: pytest -q

      - name: Run evaluation harness
        run: python scripts/eval.py --n-invoices 10 --n-ids 5

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: reports/eval_results.*
